# Reference snippet — NOT run from this repo.
#
# Paste this service into the server's /srv/trueswing/docker-compose.yml (the same
# file that already runs the backend + Caddy). Then add the admin under Caddy's
# `depends_on` and add a route in the Caddyfile that reverse-proxies to admin:3000.
#
# No env_file here: all config is baked into the image at build time (see Dockerfile
# / deploy.sh). Ports are only `expose`d — Caddy is the single ingress on 80/443,
# matching the backend services.

services:
  admin:
    image: oskarjolofsson/true_swing_admin:latest
    container_name: trueswing-admin
    restart: unless-stopped
    expose:
      - "3000"

# In the existing `caddy` service, extend depends_on:
#   depends_on:
#     - app
#     - app-preview
#     - admin
#
# Example Caddyfile route:
#   admin.trueswing.example {
#     reverse_proxy admin:3000
#   }
